name: release

# Auto-release on every green master build: bump the patch version, publish the
# image to ghcr, push the tag for record, and tell stackr to deploy huginn.
# Gated on CI success (workflow_run) so failing tests/lint never ship. Docs-only
# pushes skip CI (paths-ignore) and therefore skip release too.
#
# Build, tag-push and deploy all happen in this single run, so the tag push does
# not need a PAT — GITHUB_TOKEN can't trigger another workflow, which is fine
# here (nothing keys off the tag).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

env:
  IMAGE: ghcr.io/fyrmforge/huginn

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version tag
      packages: write # push the image to ghcr
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0 # need full tag history to compute the next version

      - name: Compute next version
        id: ver
        run: |
          latest=$(git tag -l 'v*.*.*' | sort -V | tail -1)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            IFS=. read -r maj min pat <<< "${latest#v}"
            next="v${maj}.${min}.$((pat + 1))"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Releasing $next (previous: ${latest:-none})"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/site/Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.tag }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push git tag
        run: |
          git tag "${TAG}" "${{ github.event.workflow_run.head_sha }}"
          git push origin "${TAG}"
        env:
          TAG: ${{ steps.ver.outputs.tag }}

      # DISABLED until the server side (stackr secrets, huginn .env, Authelia
      # client) is ready. Re-enable to make pushes auto-deploy. Until then this
      # workflow only builds, publishes the image, and pushes the tag.
