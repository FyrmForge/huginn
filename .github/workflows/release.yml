      #   run: |
      #     curl --fail-with-body -sS -X POST "${STACKR_URL%/}/deploy" \
      #       -H "Authorization: Bearer ${STACKR_TOKEN}" \
      #       -H "Content-Type: application/json" \
      #       -d "{\"stack\":\"huginn\",\"tag\":\"${TAG}\"}"
